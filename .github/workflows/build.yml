name: Build lqlq Browser APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Prepare release keystore
        shell: bash
        env:
          LQLQ_RELEASE_KEYSTORE_BASE64: ${{ secrets.LQLQ_RELEASE_KEYSTORE_BASE64 }}
          LQLQ_RELEASE_STORE_PASSWORD: ${{ secrets.LQLQ_RELEASE_STORE_PASSWORD }}
          LQLQ_RELEASE_KEY_ALIAS: ${{ secrets.LQLQ_RELEASE_KEY_ALIAS }}
          LQLQ_RELEASE_KEY_PASSWORD: ${{ secrets.LQLQ_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "${LQLQ_RELEASE_KEYSTORE_BASE64}" ] && [ -n "${LQLQ_RELEASE_STORE_PASSWORD}" ] && [ -n "${LQLQ_RELEASE_KEY_ALIAS}" ] && [ -n "${LQLQ_RELEASE_KEY_PASSWORD}" ]; then
            mkdir -p keystore
            echo "${LQLQ_RELEASE_KEYSTORE_BASE64}" | base64 --decode > keystore/release-upload.jks
            echo "LQLQ_SIGNED_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "LQLQ_SIGNED_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Build debug APK
        env:
          LQLQ_DYNAMIC_LOOT_ENDPOINT: ${{ vars.LQLQ_DYNAMIC_LOOT_ENDPOINT }}
        run: |
          gradle assembleDebug --no-daemon \
            -PLQLQ_DYNAMIC_LOOT_ENDPOINT="${LQLQ_DYNAMIC_LOOT_ENDPOINT:-}"

      - name: Build signed release APK
        if: ${{ env.LQLQ_SIGNED_RELEASE == 'true' }}
        env:
          LQLQ_DYNAMIC_LOOT_ENDPOINT: ${{ vars.LQLQ_DYNAMIC_LOOT_ENDPOINT }}
          LQLQ_RELEASE_STORE_FILE: keystore/release-upload.jks
          LQLQ_RELEASE_STORE_PASSWORD: ${{ secrets.LQLQ_RELEASE_STORE_PASSWORD }}
          LQLQ_RELEASE_KEY_ALIAS: ${{ secrets.LQLQ_RELEASE_KEY_ALIAS }}
          LQLQ_RELEASE_KEY_PASSWORD: ${{ secrets.LQLQ_RELEASE_KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon \
            -PLQLQ_DYNAMIC_LOOT_ENDPOINT="${LQLQ_DYNAMIC_LOOT_ENDPOINT:-}"

      - name: Collect APK outputs
        shell: bash
        run: |
          mkdir -p out
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          cp app/build/outputs/apk/debug/app-debug.apk "out/lqlq-browser-v${VERSION_NAME}-debug.apk"
          if [ "${LQLQ_SIGNED_RELEASE}" = "true" ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
            cp "$RELEASE_APK" "out/lqlq-browser-v${VERSION_NAME}-release-signed.apk"
          else
            cat <<'EOF' > "out/RELEASE_SIGNING_REQUIRED.txt"
            Signed release APK was skipped because GitHub signing secrets are missing.

            Required secrets:
            - LQLQ_RELEASE_KEYSTORE_BASE64
            - LQLQ_RELEASE_STORE_PASSWORD
            - LQLQ_RELEASE_KEY_ALIAS
            - LQLQ_RELEASE_KEY_PASSWORD
            EOF
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lqlq-browser-apk
          path: out/*
          retention-days: 30
