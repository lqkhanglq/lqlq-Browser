name: Build lqlq Browser APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cài Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK (debug + release, cùng chữ ký ổn định)
        env:
          LQLQ_DYNAMIC_LOOT_ENDPOINT: ${{ vars.LQLQ_DYNAMIC_LOOT_ENDPOINT }}
        run: |
          gradle assembleDebug assembleRelease --no-daemon \
            -PLQLQ_DYNAMIC_LOOT_ENDPOINT="${LQLQ_DYNAMIC_LOOT_ENDPOINT:-}"

      - name: Đổi tên APK
        run: |
          mkdir -p out
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          cp app/build/outputs/apk/debug/app-debug.apk "out/lqlq-browser-v${VERSION_NAME}-debug.apk"
          cp app/build/outputs/apk/release/app-release.apk "out/lqlq-browser-v${VERSION_NAME}-release.apk"

      - name: Tải APK lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lqlq-browser-apk
          path: out/*.apk
          retention-days: 30
